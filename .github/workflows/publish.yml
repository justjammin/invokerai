name: Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # Check if version needs publishing (prevents duplicate publishes)
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should-publish: ${{ steps.version-check.outputs.should-publish }}
      version: ${{ steps.version-check.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from pyproject.toml
        id: version-check
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | sed -E 's/version = "(.+)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Check if this version exists on PyPI
          echo "Checking if version $VERSION exists on PyPI..."
          if python -m pip index versions agent-invoker 2>/dev/null | grep -q "Available versions:"; then
            VERSIONS=$(python -m pip index versions agent-invoker 2>/dev/null | grep "Available versions:" | head -1)
            if echo "$VERSIONS" | grep -q "$VERSION"; then
              echo "Version $VERSION already exists on PyPI"
              echo "should-publish=false" >> $GITHUB_OUTPUT
            else
              echo "Version $VERSION is new, will publish"
              echo "should-publish=true" >> $GITHUB_OUTPUT
            fi
          else
            # Fallback: use curl to check PyPI JSON API
            echo "Using PyPI JSON API to check version..."
            if curl -s https://pypi.org/pypi/agent-invoker/json | grep -q "\"$VERSION\""; then
              echo "Version $VERSION already exists on PyPI"
              echo "should-publish=false" >> $GITHUB_OUTPUT
            else
              echo "Version $VERSION is new, will publish"
              echo "should-publish=true" >> $GITHUB_OUTPUT
            fi
          fi

  # Publish to PyPI
  publish-pypi:
    needs: check-version
    if: needs.check-version.outputs.should-publish == 'true'
    runs-on: ubuntu-latest
    environment: publish
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build distribution
        run: |
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/agent-invoker-*.tar.gz
          retention-days: 1

  # Publish to npm
  publish-npm:
    needs: check-version
    if: needs.check-version.outputs.should-publish == 'true'
    runs-on: ubuntu-latest
    environment: publish
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        run: |
          cd npm && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Update Homebrew tap formula
  update-homebrew-tap:
    needs: [check-version, publish-pypi]
    if: needs.check-version.outputs.should-publish == 'true'
    runs-on: ubuntu-latest
    environment: publish
    steps:
      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: /tmp/sdist

      - name: Calculate sha256
        id: sha256
        run: |
          SHA256=$(sha256sum /tmp/sdist/agent-invoker-*.tar.gz | awk '{print $1}')
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "Calculated SHA256: $SHA256"

      - name: Checkout Homebrew tap repo
        uses: actions/checkout@v4
        with:
          repository: justjammin/homebrew-invokerai
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula with new version
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
          SHA256: ${{ steps.sha256.outputs.sha256 }}
        run: |
          FORMULA_FILE="homebrew-tap/Formula/invokerai.rb"

          # Update url and sha256
          sed -i.bak \
            -e "s|url \"https://files.pythonhosted.org/packages/[^\"]*agent-invoker-[^\"]*\.tar\.gz\"|url \"https://files.pythonhosted.org/packages/source/a/agent-invoker/agent-invoker-${VERSION}.tar.gz\"|" \
            -e "s/sha256 \"[a-f0-9]\{64\}\"/sha256 \"${SHA256}\"/" \
            "$FORMULA_FILE"

          rm -f "$FORMULA_FILE.bak"

          echo "Updated formula:"
          head -20 "$FORMULA_FILE"

      - name: Commit and push to Homebrew tap
        run: |
          cd homebrew-tap
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add Formula/invokerai.rb
          git commit -m "chore: update invokerai formula for version ${{ needs.check-version.outputs.version }}"
          git push
